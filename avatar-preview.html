<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0b14; }
  svg { width: 512px; height: 512px; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#0b0b14"/>
  <rect width="400" height="400" fill="url(#g1)" opacity="0.03"/>

  <circle cx="200" cy="200" r="160" stroke="url(#g1)" stroke-width="0.5" opacity="0.12"/>

  <g filter="url(#glow)">
    <text x="200" y="235" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="190" font-weight="900" text-anchor="middle" fill="url(#g1)" letter-spacing="-10">E</text>
  </g>

  <text x="200" y="340" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#5a5a6a" letter-spacing="5">ENT1X</text>

  <circle cx="300" cy="95" r="3" fill="#00e5ff" opacity="0.35"/>
  <circle cx="95" cy="300" r="2.5" fill="#f472b6" opacity="0.25"/>
</svg>
</body>
</html>
