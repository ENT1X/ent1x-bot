<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ENT1X — Связь</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0b0b14;
      --bg-card: rgba(255,255,255,0.03);
      --text: #eeeef2;
      --text-muted: #7a7a8a;
      --primary: #00e5ff;
      --secondary: #7c3aed;
      --accent: #f472b6;
      --gradient: linear-gradient(135deg, #00e5ff, #7c3aed, #f472b6);
      --gradient-1: linear-gradient(135deg, #00e5ff, #7c3aed);
      --glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gradient-1); border-radius: 2px; }
    ::selection { background: var(--primary); color: #000; }

    .header {
      padding: 20px 20px 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.15;
    }

    .logo {
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo .dev {
      font-size: 0.75rem;
      opacity: 0.4;
      -webkit-text-fill-color: var(--text-muted);
    }

    .container {
      padding: 20px 16px;
      padding-bottom: calc(20px + var(--safe-bottom));
      max-width: 500px;
      margin: 0 auto;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .services {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .service-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .service-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #000;
      flex-shrink: 0;
    }

    .service-info h3 {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .service-info .price {
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .service-info .desc {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .service-card.popular {
      border-color: rgba(0, 229, 255, 0.2);
    }

    .service-card .badge {
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 60px;
      background: var(--gradient-1);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .write-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--gradient-1);
      color: #000;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0, 229, 255, 0.25);
      text-decoration: none;
    }

    .write-btn:active {
      transform: scale(0.97);
    }

    .write-btn i {
      font-size: 1.3rem;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: rgba(255,255,255,0.12);
      font-size: 0.72rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ENT1X<span class="dev">.dev</span></div>
  </div>

  <div class="container">
    <p class="subtitle">Разработка сайтов, интернет-магазинов и Telegram ботов под ключ</p>

    <div class="services">
      <div class="service-card">
        <div class="service-icon"><i class="fas fa-globe"></i></div>
        <div class="service-info">
          <h3>Сайт под ключ</h3>
          <div class="desc">Адаптивная вёрстка, SEO, анимации</div>
        </div>
        <div class="price">15 000 ₽</div>
      </div>

      <div class="service-card popular">
        <div class="service-icon"><i class="fas fa-shopping-cart"></i></div>
        <div class="service-info">
          <h3>Интернет-магазин</h3>
          <div class="desc">Корзина, оплата, админ-панель</div>
        </div>
        <span class="badge">Популярное</span>
        <div class="price">35 000 ₽</div>
      </div>

      <div class="service-card">
        <div class="service-icon"><i class="fab fa-telegram"></i></div>
        <div class="service-info">
          <h3>Telegram бот</h3>
          <div class="desc">API, БД, админка, деплой</div>
        </div>
        <div class="price">10 000 ₽</div>
      </div>
    </div>

    <a href="https://t.me/ENT1X52" target="_blank" rel="noopener" class="write-btn">
      <i class="fab fa-telegram-plane"></i>
      Написать @ENT1X52
    </a>

    <div class="footer">ENT1X &copy; 2026</div>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
    document.querySelector('.write-btn').addEventListener('click', function() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.close();
      }
    });
  </script>
</body>
</html>
