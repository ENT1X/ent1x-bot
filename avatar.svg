<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="#0b0b14"/>

  <!-- Subtle gradient overlay -->
  <rect width="400" height="400" rx="80" fill="url(#g1)" opacity="0.04"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="160" stroke="url(#g1)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="200" r="130" stroke="url(#g2)" stroke-width="0.3" opacity="0.1"/>

  <!-- Glow behind E -->
  <circle cx="200" cy="200" r="80" fill="#00e5ff" opacity="0.06" filter="url(#glow)"/>

  <!-- Main letter E -->
  <g filter="url(#softGlow)">
    <text x="200" y="230" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="180" font-weight="900" text-anchor="middle" fill="url(#g1)" letter-spacing="-8">E</text>
  </g>

  <!-- Decorative geometric elements -->
  <!-- Top right small dot -->
  <circle cx="290" cy="100" r="4" fill="#00e5ff" opacity="0.4"/>
  <!-- Bottom left small dot -->
  <circle cx="100" cy="300" r="3" fill="#f472b6" opacity="0.3"/>

  <!-- Subtle line accents -->
  <line x1="80" y1="310" x2="130" y2="310" stroke="url(#g3)" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="270" y1="90" x2="320" y2="90" stroke="url(#g2)" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Bottom tagline -->
  <text x="200" y="340" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#7a7a8a" letter-spacing="4">ENT1X.DEV</text>
</svg>
